name: Buildroot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Build buildroot
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev rsync bc \
            cpio python3 unzip wget git file
          make

      - name: Check Build
        run: |
          FILES="
          buildroot-2026.02/output/images/rootfs.romfs
          buildroot-2026.02/output/images/xipImage
          buildroot-2026.02/output/target/lib/ld-uClibc-1.0.56.so
          buildroot-2026.02/output/target/lib/libuClibc-1.0.56.so
          rootfs/init
          rootfs/lib/ld-uClibc-1.0.56.so
          rootfs/lib/libuClibc-1.0.56.so
          "

          for FILE in $FILES; do
            if [ ! -f "$FILE" ]; then
              echo "❌ $FILE is missing!"
              exit 1
            fi
            ls -lh "$FILE"
          done
